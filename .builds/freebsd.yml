image: freebsd/latest
packages:
- bearssl
environment:
  CFLAGS: -I /usr/local/include
  LDFLAGS: -L /usr/local/lib
sources:
- https://git.sr.ht/~mcf/libtls-bearssl
- https://git.sr.ht/~mcf/x509cert#0.5
tasks:
- x509cert: cd x509cert && make && sudo make install
- build: make -C libtls-bearssl CC=cc all check
