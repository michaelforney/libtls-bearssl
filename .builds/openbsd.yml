image: openbsd/latest
sources:
- https://git.sr.ht/~mcf/libtls-bearssl
- https://www.bearssl.org/git/BearSSL#v0.6
- https://git.sr.ht/~mcf/x509cert#0.5
environment:
  CFLAGS: -I /usr/local/include
  LDFLAGS: -L /usr/local/lib
tasks:
- bearssl: |
    cd BearSSL
    make
    doas cp inc/*.h /usr/local/include/
    doas cp build/libbearssl.* /usr/local/lib
    doas cp build/brssl /usr/local/bin
- x509cert: cd x509cert && make && doas make install
- build: make -C libtls-bearssl all check
